name: README artifact check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify-readme-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README-referenced assets exist
        run: |
          test -f README.md
          grep -q "assets/banner-v2.svg" README.md
          grep -q "assets/diagrams/derrr-loop.svg" README.md
          test -f assets/banner-v2.svg
          test -f assets/diagrams/derrr-loop.svg
          test -f assets/README.md
          test -f docs/derrr-formal-design.md
          test -d skill
          test -d examples
