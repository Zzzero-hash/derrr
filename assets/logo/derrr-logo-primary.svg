<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" role="img" aria-labelledby="derrrLogoTitle derrrLogoDesc">
  <title id="derrrLogoTitle">DERRR</title>
  <desc id="derrrLogoDesc">DERRR wordmark with drooling clipboard goblin mascot. Document, Execute, Review, Research, Restart.</desc>

  <defs>
    <!-- goblin skin gradient -->
    <radialGradient id="skin" cx="40%" cy="35%" r="75%">
      <stop offset="0%"  stop-color="#a8f3a2"/>
      <stop offset="55%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#3f8a4a"/>
    </radialGradient>
    <!-- drool gradient -->
    <linearGradient id="drool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#cfeaff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#6fb8ff" stop-opacity="0.95"/>
    </linearGradient>
    <!-- clipboard paper -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f5f1e6"/>
      <stop offset="100%" stop-color="#d9cfb4"/>
    </linearGradient>

    <!-- === GOBLIN SYMBOL (reusable) === -->
    <symbol id="goblin" viewBox="-110 -120 220 260" overflow="visible">
      <!-- ear left -->
      <path d="M-70,-10 L-98,-55 L-58,-35 Z"
            fill="url(#skin)" stroke="#1f3a24" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- ear right -->
      <path d="M70,-8 L102,-58 L60,-34 Z"
            fill="url(#skin)" stroke="#1f3a24" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- lumpy head -->
      <path d="
        M-68,-40
        C-82,-72 -40,-108 -2,-104
        C36,-100 78,-78 80,-38
        C84,-2 72,30 60,48
        C48,66 24,82 0,80
        C-26,82 -52,62 -66,42
        C-84,16 -82,-12 -68,-40 Z"
        fill="url(#skin)" stroke="#1f3a24" stroke-width="3" stroke-linejoin="round"/>

      <!-- cheek bumps -->
      <ellipse cx="-40" cy="32" rx="12" ry="7" fill="#5ab65f" opacity="0.55"/>
      <ellipse cx="42"  cy="34" rx="12" ry="7" fill="#5ab65f" opacity="0.55"/>

      <!-- eye whites -->
      <circle cx="-26" cy="-18" r="22" fill="#f5faf3" stroke="#1f3a24" stroke-width="2.5"/>
      <circle cx="30"  cy="-16" r="26" fill="#f5faf3" stroke="#1f3a24" stroke-width="2.5"/>
      <!-- pupils (off-kilter stare) -->
      <circle cx="-22" cy="-14" r="8.5" fill="#0b0b14"/>
      <circle cx="36"  cy="-10" r="10"  fill="#0b0b14"/>
      <circle cx="-25" cy="-17" r="2.4" fill="#ffffff"/>
      <circle cx="33"  cy="-13" r="3"   fill="#ffffff"/>

      <!-- nerd glasses -->
      <g fill="none" stroke="#a5a1ff" stroke-width="3.2">
        <circle cx="-26" cy="-18" r="24"/>
        <circle cx="30"  cy="-16" r="28"/>
        <path d="M-2,-18 L2,-16"/>
        <path d="M-50,-24 L-66,-30" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
        <path d="M58,-22 L74,-28"  stroke="#ffffff" stroke-width="2" opacity="0.8"/>
      </g>

      <!-- unibrow arch (concentration) -->
      <path d="M-46,-48 Q0,-60 56,-46" stroke="#1f3a24" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- mouth: small smirk, one fang, tongue hint -->
      <path d="M-18,42 Q4,58 26,42" stroke="#1f3a24" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M-4,44 L-2,56 L4,46 Z" fill="#fff8dc" stroke="#1f3a24" stroke-width="1.2"/>
      <path d="M10,44 Q16,52 22,44" stroke="#c84b6a" stroke-width="2" fill="none" opacity="0.7"/>

      <!-- drool drip -->
      <path d="M16,50 Q14,70 20,86 Q26,100 22,112 Q18,100 16,92 Q14,76 16,50 Z"
            fill="url(#drool)" stroke="#3a7bb8" stroke-width="1.2"/>
      <circle cx="19" cy="117" r="5" fill="url(#drool)" stroke="#3a7bb8" stroke-width="1.2"/>

      <!-- clipboard in tiny hand (bottom-left) -->
      <g transform="translate(-96 58) rotate(-12)">
        <!-- hand -->
        <ellipse cx="38" cy="18" rx="12" ry="8" fill="url(#skin)" stroke="#1f3a24" stroke-width="2"/>
        <!-- board -->
        <rect x="-2" y="-24" width="44" height="54" rx="3"
              fill="#2a223d" stroke="#1f3a24" stroke-width="2"/>
        <rect x="0" y="-20" width="40" height="46" rx="1.5" fill="url(#paper)"/>
        <!-- clip -->
        <rect x="12" y="-30" width="16" height="8" rx="1.5"
              fill="#c9c2b4" stroke="#1f3a24" stroke-width="1.5"/>
        <!-- checklist lines -->
        <g stroke="#1f3a24" stroke-width="1.4" stroke-linecap="round">
          <path d="M6,-12 L10,-8 L18,-16"/>
          <path d="M22,-12 L34,-12"/>
          <path d="M6,0 L10,4 L18,-4"/>
          <path d="M22,0 L34,0"/>
          <path d="M6,12 L34,12" stroke-dasharray="2 2"/>
          <path d="M6,22 L34,22" stroke-dasharray="2 2"/>
        </g>
      </g>
    </symbol>
  </defs>

  <!-- mascot -->
  <g transform="translate(150 130)">
    <use href="#goblin" width="220" height="260" x="-110" y="-120"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-monospace,'JetBrains Mono','Fira Code',Menlo,Consolas,monospace"
     font-weight="900" font-size="150" letter-spacing="-5">
    <text x="290" y="170" fill="#7ee787">D</text>
    <text x="390" y="170" fill="#f6c177">E</text>
    <text x="490" y="170" fill="#ff7b72">R</text>
    <text x="590" y="170" fill="#ff6ac1">R</text>
    <text x="690" y="170" fill="#a5a1ff">R</text>
  </g>

  <!-- baseline rule with loop mark -->
  <g stroke="#3a3250" stroke-width="1.5" fill="none">
    <path d="M290 196 L820 196" stroke-dasharray="4 5"/>
    <path d="M820 196 Q836 196 836 182 L836 154 Q836 140 822 140"
          stroke-dasharray="4 5"/>
    <polygon points="826,134 818,140 826,146" fill="#3a3250" stroke="none"/>
  </g>

  <!-- acronym key -->
  <g font-family="ui-monospace,'JetBrains Mono',Menlo,monospace" font-size="16" font-weight="600">
    <text x="290" y="222">
      <tspan fill="#7ee787">Document</tspan><tspan fill="#4b4666" dx="8">·</tspan>
      <tspan fill="#f6c177" dx="8">Execute</tspan><tspan fill="#4b4666" dx="8">·</tspan>
      <tspan fill="#ff7b72" dx="8">Review</tspan><tspan fill="#4b4666" dx="8">·</tspan>
      <tspan fill="#ff6ac1" dx="8">Research</tspan><tspan fill="#4b4666" dx="8">·</tspan>
      <tspan fill="#a5a1ff" dx="8">Restart</tspan>
    </text>
  </g>
</svg>
