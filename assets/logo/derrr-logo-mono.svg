<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" role="img" aria-labelledby="derrrMonoTitle derrrMonoDesc" color="#111111">
  <title id="derrrMonoTitle">DERRR (monochrome)</title>
  <desc id="derrrMonoDesc">Monochrome DERRR logo. Uses currentColor so the logo inherits whatever text color the host page sets.</desc>
  <!-- Consumers: set color via CSS `color:` on the <svg> or parent. Defaults to #111. -->

  <g fill="none" stroke="currentColor" stroke-linejoin="round" stroke-linecap="round">

    <!-- mascot -->
    <g transform="translate(150 130)" stroke-width="4">
      <!-- ears -->
      <path d="M-70,-10 L-98,-55 L-58,-35 Z" fill="currentColor" fill-opacity="0.12"/>
      <path d="M70,-8 L102,-58 L60,-34 Z"   fill="currentColor" fill-opacity="0.12"/>

      <!-- head -->
      <path d="M-68,-40 C-82,-72 -40,-108 -2,-104 C36,-100 78,-78 80,-38 C84,-2 72,30 60,48 C48,66 24,82 0,80 C-26,82 -52,62 -66,42 C-84,16 -82,-12 -68,-40 Z"
            fill="currentColor" fill-opacity="0.06"/>

      <!-- eyes -->
      <circle cx="-26" cy="-18" r="22"/>
      <circle cx="30"  cy="-16" r="26"/>
      <circle cx="-22" cy="-14" r="8"  fill="currentColor"/>
      <circle cx="36"  cy="-10" r="10" fill="currentColor"/>

      <!-- glasses -->
      <g stroke-width="3.2">
        <circle cx="-26" cy="-18" r="24"/>
        <circle cx="30"  cy="-16" r="28"/>
        <path d="M-2,-18 L2,-16"/>
      </g>

      <!-- unibrow -->
      <path d="M-46,-48 Q0,-60 56,-46" stroke-width="3.4"/>

      <!-- mouth + fang -->
      <path d="M-18,42 Q4,58 26,42" stroke-width="3"/>
      <path d="M-4,44 L-2,56 L4,46 Z" fill="currentColor" fill-opacity="0.15"/>

      <!-- drool (outline only in mono) -->
      <path d="M16,50 Q14,70 20,86 Q26,100 22,112 Q18,100 16,92 Q14,76 16,50 Z"/>
      <circle cx="19" cy="117" r="4.5"/>

      <!-- clipboard -->
      <g transform="translate(-96 58) rotate(-12)" stroke-width="2.5">
        <rect x="-2" y="-24" width="44" height="54" rx="3" fill="currentColor" fill-opacity="0.08"/>
        <rect x="12" y="-30" width="16" height="8" rx="1.5"/>
        <g stroke-width="2">
          <path d="M6,-12 L10,-8 L18,-16"/>
          <path d="M22,-12 L34,-12"/>
          <path d="M6,0 L10,4 L18,-4"/>
          <path d="M22,0 L34,0"/>
          <path d="M6,12 L34,12" stroke-dasharray="2 2"/>
          <path d="M6,22 L34,22" stroke-dasharray="2 2"/>
        </g>
      </g>
    </g>
  </g>

  <!-- wordmark -->
  <g fill="currentColor"
     font-family="ui-monospace,'JetBrains Mono','Fira Code',Menlo,Consolas,monospace"
     font-weight="900" font-size="150" letter-spacing="-5">
    <text x="290" y="170">DERRR</text>
  </g>

  <!-- baseline loop -->
  <g stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M290 196 L820 196" stroke-dasharray="4 5"/>
    <path d="M820 196 Q836 196 836 182 L836 154 Q836 140 822 140" stroke-dasharray="4 5"/>
    <polygon points="826,134 818,140 826,146" fill="currentColor" stroke="none"/>
  </g>

  <!-- acronym key -->
  <g fill="currentColor"
     font-family="ui-monospace,'JetBrains Mono',Menlo,monospace" font-size="16" font-weight="600">
    <text x="290" y="222">Document · Execute · Review · Research · Restart</text>
  </g>
</svg>
