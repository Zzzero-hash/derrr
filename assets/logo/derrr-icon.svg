<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="derrrIconTitle derrrIconDesc">
  <title id="derrrIconTitle">DERRR icon</title>
  <desc id="derrrIconDesc">Square avatar of the DERRR goblin mascot with nerd glasses, fang, drool, and a tiny clipboard.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%"  stop-color="#15102a"/>
      <stop offset="100%" stop-color="#05040a"/>
    </radialGradient>
    <radialGradient id="skinI" cx="38%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#aef3a6"/>
      <stop offset="55%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#356b3c"/>
    </radialGradient>
    <linearGradient id="droolI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#cfeaff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#6fb8ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="paperI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f5f1e6"/>
      <stop offset="100%" stop-color="#d9cfb4"/>
    </linearGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1a1530" stroke-width="1" opacity="0.5">
    <path d="M0 64H256M0 128H256M0 192H256"/>
    <path d="M64 0V256M128 0V256M192 0V256"/>
  </g>

  <!-- corner ticks -->
  <g stroke="#3a3250" stroke-width="2" fill="none">
    <path d="M14 14 L14 30 M14 14 L30 14"/>
    <path d="M242 14 L242 30 M242 14 L226 14"/>
    <path d="M14 242 L14 226 M14 242 L30 242"/>
    <path d="M242 242 L242 226 M242 242 L226 242"/>
  </g>

  <!-- mascot -->
  <g transform="translate(128 130) scale(1.05)">
    <!-- ears -->
    <path d="M-68,-10 L-94,-54 L-56,-34 Z" fill="url(#skinI)" stroke="#1f3a24" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M68,-8   L96,-56  L58,-32 Z" fill="url(#skinI)" stroke="#1f3a24" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- lumpy head -->
    <path d="M-66,-38 C-80,-70 -38,-104 0,-100 C38,-96 78,-76 80,-36 C84,0 72,30 58,46 C44,64 22,80 0,78 C-26,80 -52,60 -66,40 C-82,16 -80,-12 -66,-38 Z"
          fill="url(#skinI)" stroke="#1f3a24" stroke-width="3" stroke-linejoin="round"/>

    <!-- cheeks -->
    <ellipse cx="-42" cy="30" rx="12" ry="7" fill="#5ab65f" opacity="0.55"/>
    <ellipse cx="42"  cy="32" rx="12" ry="7" fill="#5ab65f" opacity="0.55"/>

    <!-- eyes -->
    <circle cx="-26" cy="-16" r="22" fill="#f5faf3" stroke="#1f3a24" stroke-width="2.5"/>
    <circle cx="30"  cy="-14" r="26" fill="#f5faf3" stroke="#1f3a24" stroke-width="2.5"/>
    <circle cx="-22" cy="-12" r="9"  fill="#0b0b14"/>
    <circle cx="36"  cy="-8"  r="11" fill="#0b0b14"/>
    <circle cx="-25" cy="-15" r="2.6" fill="#ffffff"/>
    <circle cx="33"  cy="-11" r="3.2" fill="#ffffff"/>

    <!-- glasses -->
    <g fill="none" stroke="#a5a1ff" stroke-width="3.4">
      <circle cx="-26" cy="-16" r="24"/>
      <circle cx="30"  cy="-14" r="28"/>
      <path d="M-2,-16 L2,-14"/>
    </g>

    <!-- unibrow -->
    <path d="M-46,-46 Q0,-58 56,-44" stroke="#1f3a24" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- mouth + fang -->
    <path d="M-18,40 Q4,56 26,40" stroke="#1f3a24" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-4,42 L-2,54 L4,44 Z" fill="#fff8dc" stroke="#1f3a24" stroke-width="1.2"/>

    <!-- drool -->
    <path d="M16,48 Q14,66 20,80 Q24,92 22,100 Q18,90 16,82 Q14,68 16,48 Z"
          fill="url(#droolI)" stroke="#3a7bb8" stroke-width="1.2"/>
    <circle cx="19" cy="104" r="4.2" fill="url(#droolI)" stroke="#3a7bb8" stroke-width="1.2"/>
  </g>

  <!-- tiny clipboard badge bottom-right -->
  <g transform="translate(186 186) rotate(-8)">
    <rect x="-18" y="-22" width="40" height="50" rx="3" fill="#2a223d" stroke="#7ee787" stroke-width="2"/>
    <rect x="-16" y="-18" width="36" height="42" rx="1.5" fill="url(#paperI)"/>
    <rect x="-6"  y="-28" width="14" height="8" rx="1.5" fill="#c9c2b4" stroke="#1f3a24" stroke-width="1.2"/>
    <g stroke="#1f3a24" stroke-width="1.4" stroke-linecap="round" fill="none">
      <path d="M-12,-8 L-8,-4 L-2,-12"/>
      <path d="M2,-8 L16,-8"/>
      <path d="M-12,4 L-8,8 L-2,0"/>
      <path d="M2,4 L16,4"/>
    </g>
  </g>
</svg>
