<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="90" y1="70" x2="1090" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="26" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="312" rx="20" stroke="#334155" stroke-width="2"/>

  <g opacity="0.18">
    <circle cx="170" cy="74" r="90" fill="#22d3ee"/>
    <circle cx="1040" cy="94" r="78" fill="#f472b6"/>
    <circle cx="1085" cy="300" r="110" fill="#818cf8"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="82" y="82" font-size="24" fill="#cbd5e1">DOCUMENT  →  EXECUTE  →  REVIEW  →  RESEARCH  →  RESTART</text>
    <text x="84" y="116" font-size="17" fill="#94a3b8">for cursed codebases, goblin agents, and teams one patch away from chaos</text>
  </g>

  <g filter="url(#glow)">
    <text x="80" y="210" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="94" font-weight="900" fill="url(#accent)">DERRR</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">
    <rect x="82" y="232" width="560" height="62" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="104" y="257" fill="#e2e8f0">👹 debug goblins</text>
    <text x="290" y="257" fill="#94a3b8">→</text>
    <text x="320" y="257" fill="#e2e8f0">📦 box them up</text>
    <text x="468" y="257" fill="#94a3b8">→</text>
    <text x="498" y="257" fill="#e2e8f0">🧾 leave an audit trail</text>
    <text x="104" y="281" fill="#94a3b8">large codebase edition</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">
    <rect x="742" y="152" width="344" height="118" rx="14" fill="#0f172a" stroke="#475569"/>
    <text x="764" y="182" fill="#e2e8f0">👹 weird model stuff</text>
    <text x="764" y="210" fill="#e2e8f0">🧪 one narrow question</text>
    <text x="764" y="238" fill="#e2e8f0">🧾 audit trail survives</text>
    <text x="764" y="266" fill="#e2e8f0">🔁 restart without lying</text>
  </g>
</svg>
