      <rect x="0" y="-20" width="40" height="46" rx="1.5" fill="url(#paper)"/>
      <rect x="12" y="-30" width="16" height="8" rx="1.5" fill="#c9c2b4" stroke="#1f3a24" stroke-width="1.2"/>
